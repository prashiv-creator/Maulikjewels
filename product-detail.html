<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Maulik Jewels</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .product-detail-page { padding-top: 150px; padding-bottom: 8rem; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
        .detail-img { border-radius: 12px; overflow: hidden; height: 600px; }
        .detail-img img { width: 100%; height: 100%; object-fit: cover; }
        .detail-info { display: flex; flex-direction: column; gap: 1.5rem; }
        .detail-title { font-size: 3rem; line-height: 1.2; }
        .detail-price { font-size: 2rem; color: var(--accent); font-weight: 700; }
        .detail-desc { color: var(--text-muted); font-size: 1.1rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem; }
        .detail-specs { display: flex; flex-direction: column; gap: 0.8rem; margin: 1rem 0; }
        .spec-item { display: flex; gap: 1rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; }
        .spec-label { color: var(--text-muted); min-width: 100px; }
        .quantity-box { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; }
        .qty-controls { display: flex; align-items: center; border: 1px solid var(--glass-border); border-radius: 4px; padding: 0.5rem; }
        .qty-btn { background: none; border: none; color: white; cursor: pointer; padding: 0 0.8rem; font-size: 1.2rem; }
        .qty-input { width: 40px; text-align: center; background: none; border: none; color: white; font-weight: bold; }
        @media (max-width: 768px) {
            .detail-grid { grid-template-columns: 1fr; gap: 2rem; }
            .detail-img { height: 400px; }
            .detail-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Header (Same as index) -->
    <header>
        <div class="container">
            <nav id="top-nav">
                <a href="index.html" class="logo">
                     <i class="fa-solid fa-gem"></i> MAULIK<span>JEWELS</span>
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Collections</a></li>
                    <li><a href="about.html">Our Story</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-actions">
                    <button class="icon-btn" id="cart-btn">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <span class="cart-count">0</span>
                    </button>
                    <a href="admin-login.html" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Admin Login</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="product-detail-page">
        <div class="container">
            <div class="detail-grid" id="product-detail-host">
                <!-- Data will be injected -->
            </div>

            <section class="related-products" style="margin-top: 8rem; padding: 0;">
                <div class="section-header" style="text-align: left; margin-bottom: 2rem;">
                    <h2>Related Products</h2>
                    <div class="section-line" style="margin: 1.5rem 0;"></div>
                </div>
                <div class="product-grid" id="related-host">
                    <!-- Related products -->
                </div>
            </section>
        </div>
    </main>

    <!-- Footer same as index -->
    <footer style="margin-top: 6rem;">
        <div class="container"><div class="footer-bottom">
            <p>&copy; 2026 Maulik Jewels. All rights reserved.</p>
        </div></div>
    </footer>

    <!-- Cart Side Panel Components -->
    <div id="cart-sidebar">
        <div class="cart-header"><h3>Bag</h3><button id="close-cart" class="icon-btn"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="cart-items"></div>
        <div class="cart-total"><span>Total:</span><span class="cart-total-amount">$0.00</span></div>
        <button class="btn btn-primary" style="width: 100%;">Checkout</button>
    </div>
    <div class="overlay"></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = parseInt(urlParams.get('id'));
            const container = document.getElementById('product-detail-host');
            const relatedHost = document.getElementById('related-host');

            if (!id) {
                window.location.href = 'products.html';
                return;
            }

            const products = getProducts();
            const product = products.find(p => p.id === id);

            if (!product) {
                container.innerHTML = '<h2>Product not found.</h2>';
                return;
            }

            document.title = `${product.name} | Maulik Jewels`;

            container.innerHTML = `
                <div class="detail-img animate-fade">
                    <img src="${product.image}" alt="${product.name}">
                </div>
                <div class="detail-info animate-fade" style="animation-delay: 0.2s;">
                    <span class="hero-badge" style="margin:0;">${product.category}</span>
                    <h1 class="detail-title">${product.name}</h1>
                    <div class="detail-price">$${product.price.toLocaleString()}</div>
                    <div class="detail-desc">${product.description}</div>
                    
                    <div class="detail-specs">
                        <div class="spec-item"><span class="spec-label">Material</span><span>${product.material}</span></div>
                        <div class="spec-item"><span class="spec-label">Availability</span><span>${product.stock > 0 ? 'In Stock' : 'Out of Stock'}</span></div>
                        <div class="spec-item"><span class="spec-label">SKU</span><span>MJ-${product.id}00${product.id}</span></div>
                    </div>

                    <div class="quantity-box">
                        <div class="qty-controls">
                            <button class="qty-btn" id="qty-minus">-</button>
                            <input type="text" value="1" id="qty-input" class="qty-input" readonly>
                            <button class="qty-btn" id="qty-plus">+</button>
                        </div>
                        <button onclick="handleAddToCart(${product.id})" class="btn btn-primary" style="flex: 1;">Add to Cart <i class="fa-solid fa-cart-shopping"></i></button>
                    </div>
                </div>
            `;

            const qtyInput = document.getElementById('qty-input');
            document.getElementById('qty-plus').addEventListener('click', () => {
                qtyInput.value = parseInt(qtyInput.value) + 1;
            });
            document.getElementById('qty-minus').addEventListener('click', () => {
                if (qtyInput.value > 1) qtyInput.value = parseInt(qtyInput.value) - 1;
            });

            // Related Products logic
            const related = products.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
            if (related.length === 0) {
                // If no same category, show any other 4
                const anyOthers = products.filter(p => p.id !== product.id).slice(0, 4);
                relatedHost.innerHTML = renderProducts(anyOthers);
            } else {
                relatedHost.innerHTML = renderProducts(related);
            }

            function renderProducts(list) {
                return list.map(p => `
                    <div class="product-card">
                        <div class="product-img">
                            <img src="${p.image}" alt="${p.name}">
                        </div>
                        <div class="product-info">
                            <h3><a href="product-detail.html?id=${p.id}">${p.name}</a></h3>
                            <div class="p-price">$${p.price.toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
            }

            window.handleAddToCart = (id) => {
                const qty = parseInt(document.getElementById('qty-input').value);
                for(let i=0; i<qty; i++) {
                    addToCart(id);
                }
            };
        });
    </script>
</body>
</html>
