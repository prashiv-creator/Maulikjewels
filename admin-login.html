<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Maulik Jewels</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-login-container">

    <div class="login-card animate-fade">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo" style="color: var(--dark); font-size: 2rem;">
                 <i class="fa-solid fa-gem" style="color: var(--accent);"></i> MAULIK<span>JEWELS</span>
            </a>
            <p style="color: #64748b; margin-top: 1rem;">Admin Portal Access</p>
        </div>

        <form id="admin-login-form">
            <div class="admin-form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin" required value="admin">
            </div>
            <div class="admin-form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required value="admin123">
            </div>
            <div style="margin-bottom: 1.5rem; display: flex; justify-content: space-between; font-size: 0.85rem;">
                <label style="display:flex; align-items:center; gap: 5px; color: #64748b; cursor:pointer;">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" style="color: var(--accent);">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; background: var(--primary);">Secure Login <i class="fa-solid fa-lock" style="margin-left: 10px;"></i></button>
        </form>

        <p style="text-align:center; font-size: 0.8rem; color: #94a3b8; margin-top: 2rem;">
            Authorized personnel only. All access is logged.
        </p>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simple hardcoded login for demo
            if (user === 'admin' && pass === 'admin123') {
                sessionStorage.setItem('mj_admin_logged_in', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Invalid credentials. Please use admin / admin123');
            }
        });
    </script>
</body>
</html>
